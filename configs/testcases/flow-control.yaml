name: flow-control
description: "Flow control with utilization-detector (default), max-num-seqs=2"
model:
  name: Qwen/Qwen3-0.6B
  uri: hf://Qwen/Qwen3-0.6B
  displayName: qwen3-0.6b-flow-control
  category: flow-control
  cache:
    enabled: true
    storageSize: 10Gi
    keepPVC: true
    timeout: 15m
deployment:
  manifestPath: flow-control.yaml
  replicas: 1
  readyTimeout: 10m
  resources:
    cpu: "2"
    memory: 8Gi
    gpus: 1
    rdma: false
validation:
  healthEndpoint: /health
  healthPort: 8000
  healthScheme: HTTPS
  inferenceCheck: true
  testPrompts:
    - "What is 2+2?"
  expectedCodes: [200]
  timeout: 2m
  retryAttempts: 3
  retryInterval: 15s
  metricsCheck:
    enabled: true
    checkVLLM: true
    checkEPP: true
    checkScheduler: true
    checkFlowControl: true
cleanup: true
