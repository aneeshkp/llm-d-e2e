name: pd-cache-aware
description: "P/D disaggregation with cache-aware routing, 2 prefill + 1 decode (default: Qwen/Qwen3-0.6B)"
model:
  name: Qwen/Qwen3-0.6B
  uri: hf://Qwen/Qwen3-0.6B
  displayName: qwen3-0.6b-pd-cache-aware
  category: multi-node-gpu
  cache:
    enabled: true
    storageSize: 10Gi
    keepPVC: true
    timeout: 15m
deployment:
  manifestPath: pd-cache-aware.yaml
  replicas: 1
  readyTimeout: 15m
  resources:
    cpu: "4"
    memory: 32Gi
    gpus: 1
    rdma: false
  prefill:
    replicas: 2
    resources:
      cpu: "4"
      memory: 32Gi
      gpus: 1
      rdma: false
validation:
  healthEndpoint: /health
  healthPort: 8000
  healthScheme: HTTPS
  inferenceCheck: true
  chatPrompts:
    # Request 1: long system prefix — gets cached by vLLM on prefill pod
    - system: "You are a helpful AI assistant specializing in distributed systems, cloud computing, and Kubernetes. You have deep expertise in GPU workloads, model serving, KV cache optimization, and inference pipeline architectures. Always provide detailed, technical answers with examples."
      user: "What is prefill decode disaggregation with prefix caching?"
    # Request 2: same prefix, different question — should route to same prefill pod (cache hit)
    - system: "You are a helpful AI assistant specializing in distributed systems, cloud computing, and Kubernetes. You have deep expertise in GPU workloads, model serving, KV cache optimization, and inference pipeline architectures. Always provide detailed, technical answers with examples."
      user: "How does KV cache transfer work with NIXL?"
    # Request 3: same prefix again — confirms cache-aware routing picks the right prefill pod
    - system: "You are a helpful AI assistant specializing in distributed systems, cloud computing, and Kubernetes. You have deep expertise in GPU workloads, model serving, KV cache optimization, and inference pipeline architectures. Always provide detailed, technical answers with examples."
      user: "Explain the benefit of combining P/D disaggregation with prefix cache-aware scheduling."
  expectedCodes: [200]
  timeout: 2m
  retryAttempts: 3
  retryInterval: 15s
  metricsCheck:
    enabled: true
    checkVLLM: true
    checkPD: true
    checkNIXL: true
    checkEPP: true
    checkPrefixCache: true
    checkScheduler: true
cleanup: true
